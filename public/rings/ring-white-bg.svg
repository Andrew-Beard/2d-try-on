<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Example 1: Ring on perfectly white background -->
  <rect width="400" height="400" fill="#FFFFFF"/>
  
  <!-- Ring band - outer -->
  <ellipse cx="200" cy="200" rx="120" ry="100" fill="none" stroke="#C9A84C" stroke-width="28"/>
  
  <!-- Ring band - inner highlight -->
  <ellipse cx="200" cy="200" rx="120" ry="100" fill="none" stroke="#E8D48B" stroke-width="8" stroke-dasharray="0" opacity="0.6"/>
  
  <!-- Ring band - shine -->
  <ellipse cx="200" cy="180" rx="100" ry="60" fill="none" stroke="#FFF5CC" stroke-width="3" opacity="0.5"/>
  
  <!-- Diamond setting base -->
  <ellipse cx="200" cy="100" rx="35" ry="20" fill="#C9A84C"/>
  <ellipse cx="200" cy="100" rx="30" ry="16" fill="#D4AF37"/>
  
  <!-- Diamond -->
  <polygon points="200,60 225,95 200,110 175,95" fill="#E8F4FD" stroke="#B8D4E8" stroke-width="1"/>
  <polygon points="200,60 212,80 200,95 188,80" fill="#FFFFFF" opacity="0.8"/>
  <polygon points="200,60 206,78 200,88 194,78" fill="#F0F8FF" opacity="0.9"/>
  
  <!-- Diamond sparkle -->
  <line x1="200" y1="55" x2="200" y2="48" stroke="#FFFFFF" stroke-width="2" opacity="0.7"/>
  <line x1="210" y1="58" x2="215" y2="52" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
  <line x1="190" y1="58" x2="185" y2="52" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
</svg>

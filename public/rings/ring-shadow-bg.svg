<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Example 2: Ring with slight shadow/gradient background -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#F5F5F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D8D8D8;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5E6A3"/>
      <stop offset="30%" style="stop-color:#C9A84C"/>
      <stop offset="60%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#DAA520"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="8" stdDeviation="6" flood-color="#00000044"/>
    </filter>
  </defs>
  
  <!-- Gradient background with shadow -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  
  <!-- Subtle surface shadow under ring -->
  <ellipse cx="205" cy="280" rx="100" ry="15" fill="#00000022"/>
  
  <!-- Ring group with drop shadow -->
  <g filter="url(#shadow)">
    <!-- Ring band - outer -->
    <ellipse cx="200" cy="200" rx="110" ry="95" fill="none" stroke="url(#goldGrad)" stroke-width="32"/>
    
    <!-- Ring band - inner edge -->
    <ellipse cx="200" cy="200" rx="96" ry="81" fill="none" stroke="#8B6914" stroke-width="2" opacity="0.4"/>
    
    <!-- Ring band - outer edge -->
    <ellipse cx="200" cy="200" rx="126" ry="111" fill="none" stroke="#8B6914" stroke-width="1" opacity="0.3"/>
  </g>
  
  <!-- Engraving pattern on band -->
  <ellipse cx="200" cy="200" rx="113" ry="98" fill="none" stroke="#FFE4A0" stroke-width="1" stroke-dasharray="8 4" opacity="0.5"/>
  
  <!-- Rose gold accent line -->
  <ellipse cx="200" cy="200" rx="108" ry="93" fill="none" stroke="#E8B4B8" stroke-width="3" opacity="0.4"/>
  
  <!-- Top setting -->
  <rect x="175" y="95" width="50" height="25" rx="5" fill="#C9A84C" stroke="#8B6914" stroke-width="1"/>
  
  <!-- Three stones -->
  <circle cx="188" cy="107" r="8" fill="#DC143C" opacity="0.9"/>
  <circle cx="188" cy="107" r="4" fill="#FF6B7A" opacity="0.6"/>
  
  <circle cx="200" cy="103" r="10" fill="#DC143C"/>
  <circle cx="200" cy="103" r="5" fill="#FF6B7A" opacity="0.7"/>
  <circle cx="198" cy="100" r="2" fill="#FFFFFF" opacity="0.8"/>
  
  <circle cx="212" cy="107" r="8" fill="#DC143C" opacity="0.9"/>
  <circle cx="212" cy="107" r="4" fill="#FF6B7A" opacity="0.6"/>
</svg>

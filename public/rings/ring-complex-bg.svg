<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Example 3: Ring on difficult/complex background -->
  <defs>
    <linearGradient id="complexBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C1810"/>
      <stop offset="25%" style="stop-color:#4A3728"/>
      <stop offset="50%" style="stop-color:#6B4C3B"/>
      <stop offset="75%" style="stop-color:#3D2B1F"/>
      <stop offset="100%" style="stop-color:#1A0F09"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="25%" style="stop-color:#C0C0C0"/>
      <stop offset="50%" style="stop-color:#A8A8A8"/>
      <stop offset="75%" style="stop-color:#D0D0D0"/>
      <stop offset="100%" style="stop-color:#B0B0B0"/>
    </linearGradient>
    <pattern id="woodGrain" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="#4A3728"/>
      <line x1="0" y1="10" x2="100" y2="15" stroke="#3D2B1F" stroke-width="2" opacity="0.5"/>
      <line x1="0" y1="25" x2="100" y2="22" stroke="#5C4033" stroke-width="3" opacity="0.3"/>
      <line x1="0" y1="40" x2="100" y2="43" stroke="#3D2B1F" stroke-width="1.5" opacity="0.4"/>
      <line x1="0" y1="55" x2="100" y2="52" stroke="#5C4033" stroke-width="2" opacity="0.35"/>
      <line x1="0" y1="70" x2="100" y2="74" stroke="#3D2B1F" stroke-width="2.5" opacity="0.4"/>
      <line x1="0" y1="88" x2="100" y2="85" stroke="#5C4033" stroke-width="1.5" opacity="0.3"/>
    </pattern>
    <filter id="heavyShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="2" dy="4" stdDeviation="8" flood-color="#000000AA"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>
  
  <!-- Complex wood-like background -->
  <rect width="400" height="400" fill="url(#complexBg)"/>
  <rect width="400" height="400" fill="url(#woodGrain)" opacity="0.7"/>
  
  <!-- Background texture noise (circles) -->
  <circle cx="50" cy="80" r="30" fill="#3D2B1F" opacity="0.3"/>
  <circle cx="350" cy="120" r="45" fill="#2C1810" opacity="0.2"/>
  <circle cx="300" cy="350" r="60" fill="#4A3728" opacity="0.25"/>
  <circle cx="80" cy="320" r="35" fill="#5C4033" opacity="0.2"/>
  
  <!-- Velvet-like surface area under ring -->
  <ellipse cx="200" cy="240" rx="130" ry="50" fill="#1A0505" opacity="0.3"/>
  
  <!-- Ring with heavy shadow on dark bg -->
  <g filter="url(#heavyShadow)">
    <!-- Silver ring band -->
    <ellipse cx="200" cy="200" rx="105" ry="90" fill="none" stroke="url(#silverGrad)" stroke-width="26"/>
    
    <!-- Platinum sheen -->
    <ellipse cx="200" cy="185" rx="90" ry="55" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- Band detail -->
  <ellipse cx="200" cy="200" rx="117" ry="102" fill="none" stroke="#888888" stroke-width="1" opacity="0.4"/>
  <ellipse cx="200" cy="200" rx="91" ry="76" fill="none" stroke="#888888" stroke-width="1" opacity="0.3"/>
  
  <!-- Sapphire setting -->
  <ellipse cx="200" cy="105" rx="30" ry="18" fill="#C0C0C0" stroke="#888888" stroke-width="1"/>
  
  <!-- Prongs -->
  <line x1="178" y1="108" x2="175" y2="95" stroke="#D0D0D0" stroke-width="3"/>
  <line x1="222" y1="108" x2="225" y2="95" stroke="#D0D0D0" stroke-width="3"/>
  <line x1="200" y1="100" x2="200" y2="88" stroke="#D0D0D0" stroke-width="3"/>
  
  <!-- Sapphire gem -->
  <ellipse cx="200" cy="98" rx="18" ry="14" fill="#1A237E"/>
  <ellipse cx="200" cy="98" rx="18" ry="14" fill="#283593" opacity="0.7"/>
  <ellipse cx="197" cy="95" rx="10" ry="7" fill="#3949AB" opacity="0.6"/>
  <ellipse cx="195" cy="93" rx="5" ry="3" fill="#7986CB" opacity="0.7"/>
  <ellipse cx="194" cy="92" rx="2" ry="1" fill="#FFFFFF" opacity="0.8"/>
  
  <!-- Reflection spots -->
  <circle cx="206" cy="100" r="1.5" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="200" cy="104" r="1" fill="#9FA8DA" opacity="0.4"/>
  
  <!-- Small accent diamonds on band -->
  <circle cx="170" cy="118" r="3" fill="#E0E0E0" stroke="#AAAAAA" stroke-width="0.5"/>
  <circle cx="230" cy="118" r="3" fill="#E0E0E0" stroke="#AAAAAA" stroke-width="0.5"/>
</svg>
